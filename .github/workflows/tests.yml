name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run self-contained test suite
        run: go test ./...

  live-integration:
    name: Live Integration
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Start docker compose stack
        run: docker compose up -d --build

      - name: Wait for AnchorDB health endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "AnchorDB did not become healthy in time" >&2
          docker compose ps
          exit 1

      - name: Run live integration tests
        run: go test -tags=integration ./integration/...

      - name: Dump docker compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop docker compose stack
        if: always()
        run: docker compose down -v
