name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build all packages
        run: go build ./...

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        run: docker build -t anchordb:ci .
