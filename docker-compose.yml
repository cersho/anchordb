services:
  anchordb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anchordb
    environment:
      HTTP_ADDR: ":8080"
      METADATA_DRIVER: "sqlite"
      METADATA_DB_URL: "/data/anchordb.db"
      SECRET_KEY: "change-this-secret-key"
      DEFAULT_LOCAL_BACKUP_PATH: "/data/backups"
      MAX_CONCURRENT_BACKUPS: "2"
      BACKUP_COMMAND_TIMEOUT: "2h"
    ports:
      - "8080:8080"
    volumes:
      - anchordb-data:/data
    depends_on:
      postgres-source:
        condition: service_healthy
      mysql-source:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  postgres-source:
    image: postgres:16-alpine
    container_name: anchordb-postgres
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pg-data:/var/lib/postgresql/data

  mysql-source:
    image: mysql:8.4
    container_name: anchordb-mysql
    environment:
      MYSQL_DATABASE: appdb
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - mysql-data:/var/lib/mysql

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: anchordb-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: anchordb-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c
      "until mc alias set local http://minio:9000 minio minio123; do sleep 1; done &&
      mc mb --ignore-existing local/anchordb-backups"
    restart: "no"

volumes:
  anchordb-data:
  pg-data:
  mysql-data:
  minio-data:
