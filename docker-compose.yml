services:
  anchordb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anchordb
    environment:
      HTTP_ADDR: ":8080"
      METADATA_DRIVER: "sqlite"
      METADATA_DB_URL: "/data/anchordb.db"
      SECRET_KEY: "change-this-secret-key"
      DEFAULT_LOCAL_BACKUP_PATH: "/data/backups"
      MAX_CONCURRENT_BACKUPS: "2"
      BACKUP_COMMAND_TIMEOUT: "2h"
    ports:
      - "8080:8080"
    volumes:
      - anchordb-data:/data
    depends_on:
      postgres-source:
        condition: service_healthy
      mysql-source:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  postgres-source:
    image: postgres:16-alpine
    container_name: anchordb-postgres
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pg-data:/var/lib/postgresql/data

  mysql-source:
    image: mysql:8.4
    container_name: anchordb-mysql
    environment:
      MYSQL_DATABASE: appdb
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - mysql-data:/var/lib/mysql

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: anchordb-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: anchordb-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c
      "until mc alias set local http://minio:9000 minio minio123; do sleep 1; done &&
      mc mb --ignore-existing local/anchordb-backups"
    restart: "no"

  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    container_name: anchordb-convex-backend
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    volumes:
      - convex-data:/convex/data
    environment:
      - ACTIONS_USER_TIMEOUT_SECS
      - APPLICATION_MAX_CONCURRENT_MUTATIONS=16
      - APPLICATION_MAX_CONCURRENT_NODE_ACTIONS=16
      - APPLICATION_MAX_CONCURRENT_QUERIES=16
      - APPLICATION_MAX_CONCURRENT_V8_ACTIONS=16
      - AWS_ACCESS_KEY_ID
      - AWS_REGION
      - AWS_S3_DISABLE_CHECKSUMS
      - AWS_S3_DISABLE_SSE
      - AWS_S3_FORCE_PATH_STYLE
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
      - CONVEX_RELEASE_VERSION_DEV
      - CONVEX_SITE_ORIGIN=http://127.0.0.1:3211
      - DATABASE_URL
      - DISABLE_BEACON
      - DISABLE_METRICS_ENDPOINT=true
      - DOCUMENT_RETENTION_DELAY=172800
      - DO_NOT_REQUIRE_SSL
      - HTTP_SERVER_TIMEOUT_SECONDS
      - INSTANCE_NAME
      - INSTANCE_SECRET
      - MYSQL_URL
      - POSTGRES_URL
      - REDACT_LOGS_TO_CLIENT
      - RUST_BACKTRACE
      - RUST_LOG=info
      - S3_ENDPOINT_URL
      - S3_STORAGE_EXPORTS_BUCKET
      - S3_STORAGE_FILES_BUCKET
      - S3_STORAGE_MODULES_BUCKET
      - S3_STORAGE_SEARCH_BUCKET
      - S3_STORAGE_SNAPSHOT_IMPORTS_BUCKET
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3210/version"]
      interval: 5s
      start_period: 10s

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: anchordb-convex-dashboard
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=http://127.0.0.1:3210
      - NEXT_PUBLIC_LOAD_MONACO_INTERNALLY
    depends_on:
      backend:
        condition: service_healthy

volumes:
  anchordb-data:
  pg-data:
  mysql-data:
  minio-data:
  convex-data:
